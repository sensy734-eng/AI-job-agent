services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-job-agent-pgvector
    environment:
      POSTGRES_DB: job_agent
      POSTGRES_USER: job_agent
      POSTGRES_PASSWORD: job_agent_dev
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_agent -d job_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgvector_data:
